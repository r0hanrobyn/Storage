# ===========================
# SERVER CONFIG
# ===========================
server.port=8080

# ===========================
# H2 DATABASE CONFIG
# ===========================
spring.datasource.url=jdbc:h2:mem:minicloud
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA CONFIG
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# FILE STORAGE CONFIG
# ===========================
storage.location=C:/minicloud/uploads
storage.quota-bytes=524288000

# ===========================
# FILE SIZE LIMITS
# ===========================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===========================
# SPRINGDOC / SWAGGER CONFIG
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================
# JWT CONFIG
# ===========================
jwt.secret=minicloud_super_secret_key_change_this_in_production
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===========================
# ACTUATOR CONFIG
# ===========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
info.app.name=Minicloud
info.app.version=1.0.0
